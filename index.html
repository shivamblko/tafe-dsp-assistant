<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>DSP Assistant · TAFE</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: { extend: { fontFamily: { sans: ['Inter','system-ui','-apple-system','BlinkMacSystemFont','sans-serif'] }, colors: { navy: { DEFAULT:'#0A1628',900:'#060E1A',800:'#0A1628',700:'#122038',600:'#1A2D4D',500:'#2A4068',300:'#8A9BB5' }, brand: { red:'#E31837',redDark:'#B8122C',redSoft:'#FEF2F4' }, ink: { DEFAULT:'#111827',muted:'#6B7280',faint:'#9CA3AF' }, line:'#E5E7EB', surface:'#FFFFFF', canvas:'#F7F8FA', good: { DEFAULT:'#059669',soft:'#ECFDF5' }, warn: { DEFAULT:'#D97706',soft:'#FFFBEB' } }, boxShadow: { card:'0 1px 3px rgba(0,0,0,0.04),0 8px 24px -6px rgba(0,0,0,0.08)', pop:'0 20px 60px -12px rgba(0,0,0,0.18)', rail:'0 4px 20px rgba(0,0,0,0.06)', lift:'0 8px 32px -8px rgba(0,0,0,0.12)', glow:'0 0 0 1px rgba(0,0,0,0.03),0 12px 40px -8px rgba(227,24,55,0.15)' }, borderRadius: { '2xl':'1rem','3xl':'1.25rem','4xl':'1.5rem' }, keyframes: { fadeup:{'0%':{opacity:0,transform:'translateY(16px)'},'100%':{opacity:1,transform:'translateY(0)'}}, fadein:{'0%':{opacity:0},'100%':{opacity:1}}, slidein:{'0%':{transform:'translateX(100%)'},'100%':{transform:'translateX(0)'}}, slideup:{'0%':{transform:'translateY(100%)'},'100%':{transform:'translateY(0)'}}, pulsesoft:{'0%,100%':{opacity:1},'50%':{opacity:0.4}}, spin:{to:{transform:'rotate(360deg)'}}, grow:{'0%':{transform:'scaleX(0)'},'100%':{transform:'scaleX(1)'}}, shimmer:{'0%':{backgroundPosition:'-200% 0'},'100%':{backgroundPosition:'200% 0'}} }, animation: { fadeup:'fadeup 0.55s cubic-bezier(0.16,1,0.3,1) forwards', fadein:'fadein 0.4s ease forwards', slidein:'slidein 0.35s cubic-bezier(0.16,1,0.3,1) forwards', slideup:'slideup 0.4s cubic-bezier(0.16,1,0.3,1) forwards', pulsesoft:'pulsesoft 2s ease-in-out infinite', spin:'spin 0.8s linear infinite', grow:'grow 0.8s cubic-bezier(0.16,1,0.3,1) forwards', shimmer:'shimmer 2s linear infinite' } } }
  };
</script>
<style>
  html,body,#root{height:100%}
  body{margin:0;background:#F7F8FA;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;font-feature-settings:'cv02','cv03','cv04','cv11'}
  *{box-sizing:border-box}
  :root{--gutter:16px;--header-h:52px;--step-h:44px;--nav-h:56px;--action-h:72px;--radius-card:20px;--section-gap:16px}
  @media(min-width:640px){:root{--gutter:20px}}
  .app-bg{background:#F7F8FA}
  .scroll-main{flex:1;min-height:0;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding-bottom:env(safe-area-inset-bottom,0px)}
  .scroll-main.with-action{padding-bottom:calc(var(--action-h) + env(safe-area-inset-bottom,0px))}
  .glass-header{background:rgba(255,255,255,0.82);backdrop-filter:blur(20px) saturate(180%);-webkit-backdrop-filter:blur(20px) saturate(180%);border-bottom:1px solid rgba(0,0,0,0.06)}
  .product-stage{background:linear-gradient(180deg,#F0F2F5 0%,#FAFAFA 40%,#FFFFFF 100%)}
  .tafe-hero{background:radial-gradient(ellipse 60% 80% at 75% 60%,#FF4500 0%,transparent 65%),radial-gradient(ellipse 40% 50% at 85% 100%,#FF7B00 0%,transparent 60%),linear-gradient(135deg,#1A0500 0%,#2A0800 35%,#6B1000 70%,#A01800 100%);position:relative;overflow:hidden}
  .safe-bottom{padding-bottom:env(safe-area-inset-bottom,0px)}
  ::-webkit-scrollbar{width:6px;height:6px}::-webkit-scrollbar-thumb{background:#D1D5DB;border-radius:99px}::-webkit-scrollbar-track{background:transparent}
  .no-sb::-webkit-scrollbar{display:none}.no-sb{scrollbar-width:none;-ms-overflow-style:none}
  .tabnums{font-variant-numeric:tabular-nums}.text-balance{text-wrap:balance}
  @media(min-width:420px){.xs\:block{display:block}}
  input[type=range]{-webkit-appearance:none;appearance:none;background:transparent}
  input[type=range]::-webkit-slider-runnable-track{height:3px;border-radius:999px;background:#E5E7EB}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:22px;height:22px;margin-top:-9.5px;border-radius:50%;background:#0A1628;border:3px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,0.15);cursor:pointer}
  details>summary{list-style:none;cursor:pointer}details>summary::-webkit-details-marker{display:none}
  .h-scroll-rail{display:flex;gap:12px;overflow-x:auto;overflow-y:hidden;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;padding-bottom:2px}
  .h-scroll-rail>*{scroll-snap-align:center;flex-shrink:0}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin></script>
<script type="text/babel" src="data.jsx"></script>
<script type="text/babel" src="icons.jsx"></script>
<script type="text/babel" src="ui.jsx"></script>
<script type="text/babel" src="screens1-2.jsx"></script>
<script type="text/babel" src="shell.jsx"></script>
<script type="text/babel">
ReactDOM.createRoot(document.getElementById('root')).render(
  <ToastProvider>
    <div className="min-h-screen flex flex-col app-bg overflow-hidden">
      <PageHeader screen="landing" />
      <main className="flex-1 overflow-y-auto overflow-x-hidden no-sb">
        <div className="animate-fadein">
          <ScreenLanding nav={nav} />
        </div>
      </main>
    </div>
  </ToastProvider>
);
</script>
</body>
</html>
